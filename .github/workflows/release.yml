name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:

  build:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-android
      - uses: ./.github/actions/setup-keystore
        with:
          keystore-base64: ${{ secrets.KEYSTORE_BASE64 }}
          store-password: ${{ secrets.STORE_PASSWORD }}
          expected-fingerprint: ${{ vars.KEYSTORE_FINGERPRINT }}

      - name: Build release APK and AAB
        run: |
          ./gradlew assembleRelease 
          ./gradlew bundleRelease
        env:
          SIGNING_STORE_FILE: ${{ runner.temp }}/keystore.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - uses: actions/upload-artifact@v7
        with:
          name: release-artifacts
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
            app/build/outputs/mapping/release/mapping.txt

  publish:
    name: Update Changelog & GitHub Pages
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 30
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Update CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md

      - name: Generate release notes for this tag
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip all
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Generate legal HTML pages
        run: python3 docs/scripts/generate_legal.py

      - name: Commit and push all release artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md docs/privacy.html docs/terms.html docs/changelog.html
          git diff --staged --quiet || git commit -m "chore(release): update changelog and site for ${{ steps.version.outputs.version }}"
          git pull --rebase origin main
          git push origin HEAD:main

      - uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: RELEASE_NOTES.md

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, publish]
    timeout-minutes: 30
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: release-artifacts
          path: artifacts/

      - uses: actions/download-artifact@v8
        with:
          name: release-notes
          path: .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Shellify ${{ needs.publish.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: artifacts/**
          draft: false
          prerelease: ${{ contains(needs.publish.outputs.version, '-alpha') || contains(needs.publish.outputs.version, '-beta') || contains(needs.publish.outputs.version, '-rc') }}

      - name: Write release summary
        run: |
          echo "## Release ${{ needs.publish.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Release APK | ✅ Built & uploaded |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Release AAB | ✅ Built & uploaded |" >> $GITHUB_STEP_SUMMARY
          echo "| 📋 CHANGELOG.md | ✅ Updated & committed to main |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 GitHub Pages | ✅ Legal pages regenerated |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 GitHub Release | ✅ Published |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Release Notes" >> $GITHUB_STEP_SUMMARY
          cat RELEASE_NOTES.md >> $GITHUB_STEP_SUMMARY
