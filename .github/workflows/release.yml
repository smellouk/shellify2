name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:

  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Update CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release notes for this tag
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip all
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "chore: update CHANGELOG.md for ${{ steps.version.outputs.version }}"
          git push origin HEAD:main

      - uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: RELEASE_NOTES.md

  build:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    needs: changelog
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ runner.temp }}/keystore.jks

      - name: Build release APK
        run: ./gradlew assembleRelease
        env:
          SIGNING_STORE_FILE: ${{ runner.temp }}/keystore.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build release AAB
        run: ./gradlew bundleRelease
        env:
          SIGNING_STORE_FILE: ${{ runner.temp }}/keystore.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk

      - uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: app/build/outputs/bundle/release/*.aab

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [changelog, build]
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: release-apk
          path: artifacts/

      - uses: actions/download-artifact@v8
        with:
          name: release-aab
          path: artifacts/

      - uses: actions/download-artifact@v8
        with:
          name: release-notes
          path: .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Shellify ${{ needs.changelog.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(needs.changelog.outputs.version, '-alpha') || contains(needs.changelog.outputs.version, '-beta') || contains(needs.changelog.outputs.version, '-rc') }}

      - name: Write release summary
        run: |
          echo "## Release ${{ needs.changelog.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Release APK | ✅ Built & uploaded |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Release AAB | ✅ Built & uploaded |" >> $GITHUB_STEP_SUMMARY
          echo "| 📋 CHANGELOG.md | ✅ Updated & committed to main |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 GitHub Release | ✅ Published |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Release Notes" >> $GITHUB_STEP_SUMMARY
          cat RELEASE_NOTES.md >> $GITHUB_STEP_SUMMARY

  update-site:
    name: Update GitHub Pages
    runs-on: ubuntu-latest
    needs: [release, changelog]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate legal HTML pages
        run: python3 docs/scripts/generate_legal.py

      - name: Commit and push updated pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/privacy.html docs/terms.html
          git diff --staged --quiet || git commit -m "chore(site): regenerate legal pages for ${{ needs.changelog.outputs.version }}"
          git push origin HEAD:main

      - name: Write site update summary
        run: |
          echo "| 🌐 GitHub Pages | ✅ Legal pages regenerated |" >> $GITHUB_STEP_SUMMARY
